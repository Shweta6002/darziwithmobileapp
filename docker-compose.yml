services:
  api:
    build: .
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - mysql
      - redis

  worker:
    build: .
    command: npm run worker
    env_file: .env
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: darzi
      MYSQL_USER: darzi
      MYSQL_PASSWORD: darzi_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./apps/backend/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mysql_data:
